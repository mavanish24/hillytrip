<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>HillyTrip - India's Intelligent Mountain Travel Network</title>
    
    <!-- Speed & Network Preconnections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    
    <!-- PWA primary details -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#064e3b" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="India's Intelligent Mountain Travel Network - Your comprehensive travel intelligence platform for Himalayan routes, attractions, and eco-homestays." />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- OpenGraph Tag fallbacks (Social Platforms) -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HillyTrip - India's Intelligent Mountain Travel Network" />
    <meta property="og:description" content="India's Intelligent Mountain Travel Network - Your comprehensive travel intelligence platform for Himalayan routes, attractions, and eco-homestays." />
    <meta property="og:url" content="https://hillytrip.com" />
    <meta property="og:site_name" content="HillyTrip" />
    <meta property="og:image" content="https://hillytrip.com/hillytrip_logo.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HillyTrip - India's Intelligent Mountain Travel Network" />
    <meta name="twitter:description" content="India's Intelligent Mountain Travel Network - Your comprehensive travel intelligence platform for Himalayan routes, attractions, and eco-homestays." />
    <meta name="twitter:image" content="https://hillytrip.com/hillytrip_logo.jpg" />
    
    <!-- Apple Mobile Web App Support iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HillyTrip" />
    <link rel="apple-touch-icon" href="/hillytrip_logo.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
